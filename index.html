<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>學生報紙排版系統</title>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
  margin:0;
  background:#d1d5db;
  font-family:system-ui;
}

@media print{

  body{
    background:white;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  .no-print{
    display:none !important;
  }

  @page{
    size:A3 landscape;
    margin:0;
  }
}

/* =========================
   A3 報紙
========================= */

.paper{

  width:420mm;
  min-height:297mm;

  margin:auto;

  background:#f5ecd8;

  box-shadow:0 10px 40px rgba(0,0,0,0.18);

  /* ★ 固定上下2公分 */
  padding-top:2cm;
  padding-bottom:2cm;

  padding-left:1.5cm;
  padding-right:1.5cm;
}

/* =========================
   六欄真正報紙
========================= */

.news-grid{

  display:grid;

  grid-template-columns:repeat(6,1fr);

  gap:1rem;

  align-items:start;
}

/* =========================
   文章
========================= */

.article{

  background:rgba(255,255,255,0.45);

  border:2px solid #444;

  padding:14px;

  break-inside:avoid;
  page-break-inside:avoid;
}

.article img{

  width:100%;
  height:auto;

  object-fit:cover;

  border:2px solid #333;

  margin-bottom:12px;
}

.toolbar{

  width:380px;
  height:100vh;

  overflow:auto;

  background:white;

  border-right:1px solid #ddd;
}

.resize-btn{

  width:36px;
  height:36px;

  border-radius:10px;

  border:none;

  cursor:pointer;

  font-weight:bold;
}

textarea{
  resize:vertical;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useRef} = React;

/* =========================
   預設資料
========================= */

const defaultArticles = [

{
  id:1,
  title:'媽媽謝謝您',
  author:'小安',

  content:
`媽媽每天幫我準備早餐。
我最喜歡媽媽的笑容。
謝謝媽媽照顧我。`,

  image:'https://picsum.photos/700/500?1',

  imageSize:'small',
  colSpan:1
},

{
  id:2,
  title:'戶外教育真有趣',
  author:'小熙',

  content:
`我們去了科學博物館。
我看到恐龍骨骼。
我覺得很好玩。`,

  image:'https://picsum.photos/700/500?2',

  imageSize:'medium',
  colSpan:2
},

{
  id:3,
  title:'我的媽媽',
  author:'小晴',

  content:
`媽媽很溫柔。
我愛媽媽。
我要送媽媽卡片。`,

  image:'https://picsum.photos/700/500?3',

  imageSize:'large',
  colSpan:3
}

];

/* =========================
   App
========================= */

function App(){

  const [articles,setArticles] = useState(defaultArticles);

  const jsonInputRef = useRef(null);

  /* =========================
     修改欄位
  ========================= */

  const updateArticle = (id,key,value)=>{

    setArticles(prev =>
      prev.map(a =>
        a.id===id
          ? {...a,[key]:value}
          : a
      )
    );
  };

  /* =========================
     圖片大小 → 自動欄位
  ========================= */

  const changeImageSize = (id,size)=>{

    const map = {

      small:{
        span:1
      },

      medium:{
        span:2
      },

      large:{
        span:3
      }

    };

    setArticles(prev =>

      prev.map(a => {

        if(a.id !== id) return a;

        return {

          ...a,

          imageSize:size,

          /* ★ 自動改版面 */
          colSpan:map[size].span
        };

      })

    );
  };

  /* =========================
     新增文章
  ========================= */

  const addArticle = ()=>{

    setArticles(prev => [

      ...prev,

      {

        id:Date.now(),

        title:'新文章',

        author:'作者',

        content:'請輸入內容...',

        image:'https://picsum.photos/700/500?' + Math.random(),

        imageSize:'medium',

        colSpan:2
      }

    ]);
  };

  /* =========================
     刪除
  ========================= */

  const deleteArticle = (id)=>{

    setArticles(prev =>
      prev.filter(a => a.id !== id)
    );
  };

  /* =========================
     上傳圖片
  ========================= */

  const uploadImage = (id,e)=>{

    const file = e.target.files[0];

    if(!file) return;

    const url = URL.createObjectURL(file);

    updateArticle(id,'image',url);
  };

  /* =========================
     匯出 JSON
  ========================= */

  const exportJSON = ()=>{

    const data = {

      articles

    };

    const blob = new Blob(

      [JSON.stringify(data,null,2)],

      {
        type:'application/json'
      }

    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');

    a.href = url;

    a.download = '學生報紙.json';

    a.click();

    URL.revokeObjectURL(url);
  };

  /* =========================
     載入 JSON
  ========================= */

  const loadJSON = (e)=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = (ev)=>{

      try{

        const data = JSON.parse(ev.target.result);

        if(data.articles){

          const fixedArticles = data.articles.map(a => ({

            imageSize:'medium',

            colSpan:2,

            ...a

          }));

          setArticles(fixedArticles);

          alert('✅ JSON 載入成功');

        }

      }catch(err){

        alert('❌ JSON 格式錯誤');

      }

    };

    reader.readAsText(file);
  };

  /* =========================
     自動暫存
  ========================= */

  useEffect(()=>{

    localStorage.setItem(

      'newspaper_storage_v3',

      JSON.stringify({articles})

    );

  },[articles]);

  /* =========================
     開啟自動讀取
  ========================= */

  useEffect(()=>{

    const raw = localStorage.getItem(
      'newspaper_storage_v3'
    );

    if(raw){

      try{

        const data = JSON.parse(raw);

        if(data.articles){

          setArticles(

            data.articles.map(a => ({

              imageSize:'medium',

              colSpan:2,

              ...a

            }))

          );

        }

      }catch(err){}

    }

  },[]);

  return(

  <div className="flex">

    {/* =========================
         左側控制
    ========================= */}

    <div className="toolbar no-print p-5">

      <div className="flex justify-between items-center mb-6">

        <h1 className="text-2xl font-black">
          學生報紙
        </h1>

        <button
          onClick={addArticle}
          className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold"
        >
          新增
        </button>

      </div>

      <div className="space-y-5">

        {articles.map(article => (

          <div
            key={article.id}
            className="border rounded-2xl p-4 bg-gray-50"
          >

            {/* 標題 */}

            <div className="mb-3">

              <label className="text-xs font-bold text-gray-500">
                標題
              </label>

              <input
                value={article.title}
                onChange={e=>updateArticle(article.id,'title',e.target.value)}
                className="w-full border p-2 rounded-lg mt-1"
              />

            </div>

            {/* 作者 */}

            <div className="mb-3">

              <label className="text-xs font-bold text-gray-500">
                作者
              </label>

              <input
                value={article.author}
                onChange={e=>updateArticle(article.id,'author',e.target.value)}
                className="w-full border p-2 rounded-lg mt-1"
              />

            </div>

            {/* 內文 */}

            <div className="mb-3">

              <label className="text-xs font-bold text-gray-500">
                內容
              </label>

              <textarea
                rows="5"
                value={article.content}
                onChange={e=>updateArticle(article.id,'content',e.target.value)}
                className="w-full border p-2 rounded-lg mt-1"
              />

            </div>

            {/* 圖片 */}

            <div className="mb-4">

              <label className="text-xs font-bold text-gray-500">
                圖片
              </label>

              <div className="mt-2">

                <img
                  src={article.image}
                  className="w-full rounded-xl border mb-2"
                />

                <input
                  type="file"
                  accept="image/*"
                  onChange={(e)=>uploadImage(article.id,e)}
                  className="w-full text-sm"
                />

              </div>

            </div>

            {/* 圖片大小 */}

            <div className="mb-4">

              <div className="text-xs font-bold text-gray-500 mb-2">
                圖片大小（自動調整版面）
              </div>

              <div className="flex gap-2">

                <button
                  onClick={()=>changeImageSize(article.id,'small')}
                  className={`resize-btn ${
                    article.imageSize==='small'
                    ? 'bg-indigo-600 text-white'
                    : 'bg-gray-200'
                  }`}
                >
                  小
                </button>

                <button
                  onClick={()=>changeImageSize(article.id,'medium')}
                  className={`resize-btn ${
                    article.imageSize==='medium'
                    ? 'bg-indigo-600 text-white'
                    : 'bg-gray-200'
                  }`}
                >
                  中
                </button>

                <button
                  onClick={()=>changeImageSize(article.id,'large')}
                  className={`resize-btn ${
                    article.imageSize==='large'
                    ? 'bg-indigo-600 text-white'
                    : 'bg-gray-200'
                  }`}
                >
                  大
                </button>

              </div>

            </div>

            {/* 手動調整欄數 */}

            <div className="mb-4">

              <div className="text-xs font-bold text-gray-500 mb-2">
                手動版面寬度
              </div>

              <div className="flex flex-wrap gap-2">

                {[1,2,3,4,5,6].map(n => (

                  <button
                    key={n}
                    onClick={()=>updateArticle(article.id,'colSpan',n)}
                    className={`w-9 h-9 rounded-lg font-bold ${
                      article.colSpan===n
                      ? 'bg-rose-500 text-white'
                      : 'bg-gray-200'
                    }`}
                  >
                    {n}
                  </button>

                ))}

              </div>

            </div>

            {/* 刪除 */}

            <button
              onClick={()=>deleteArticle(article.id)}
              className="bg-red-500 text-white w-full py-3 rounded-xl font-bold"
            >
              刪除文章
            </button>

          </div>

        ))}

      </div>

      {/* JSON */}

      <input
        type="file"
        accept=".json"
        ref={jsonInputRef}
        onChange={loadJSON}
        style={{display:'none'}}
      />

      <div className="grid grid-cols-2 gap-3 mt-6">

        <button
          onClick={exportJSON}
          className="bg-indigo-600 text-white py-3 rounded-2xl font-bold"
        >
          匯出 JSON
        </button>

        <button
          onClick={()=>jsonInputRef.current.click()}
          className="bg-white border-2 border-indigo-600 text-indigo-600 py-3 rounded-2xl font-bold"
        >
          載入 JSON
        </button>

      </div>

      {/* 列印 */}

      <button
        onClick={()=>window.print()}
        className="w-full mt-4 bg-green-600 text-white py-4 rounded-2xl font-black text-lg"
      >
        列印 / PDF
      </button>

    </div>

    {/* =========================
         右側報紙
    ========================= */}

    <div className="flex-1 overflow-auto p-8">

      <div className="paper">

        {/* 標題 */}

        <div className="border-b-[6px] border-double border-black pb-5 mb-8">

          <div className="text-center">

            <div className="tracking-[0.4em] text-gray-600 mb-3 font-bold">
              CLASS TIMES
            </div>

            <h1 className="text-7xl font-black tracking-widest mb-5">
              六年甲班小報
            </h1>

            <div className="border-y-2 border-black py-2 flex justify-between text-sm font-bold">
              <span>🌸 母親節 × 戶外教育特刊 🌿</span>
              <span>2026 年 5 月</span>
            </div>

          </div>

        </div>

        {/* 六欄報紙 */}

        <div className="news-grid">

          {articles.map(article => (

            <div
              key={article.id}
              className="article"
              style={{
                gridColumn:`span ${article.colSpan}`
              }}
            >

              <h2 className="text-3xl font-black mb-2 leading-tight">
                {article.title}
              </h2>

              <div className="text-sm font-bold text-gray-500 mb-4">
                撰文 / {article.author}
              </div>

              <img src={article.image}/>

              <div className="leading-relaxed whitespace-pre-line text-[15px]">
                {article.content}
              </div>

            </div>

          ))}

        </div>

      </div>

    </div>

  </div>

  );

}

ReactDOM
  .createRoot(document.getElementById('root'))
  .render(<App />);

</script>

</body>
</html>
