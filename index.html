<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生作品排版產生器 — 母親節 × 戶外教育特刊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
    .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }
    .mic-listening { animation: mic-pulse 1.2s ease-in-out infinite; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .toast-anim { animation: toast-in 0.25s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useCallback } = React;

  /* ───── Constants ───── */
  /* ───── Constants ───── */
const AUTHORS = ['小齊', '小欣', '小晴', '小銓', '小洋', '小沄', '小盧', '小舜', '小安', '小凱', '小熙', '小睿', '小硯', '小碩', '小翰', '小愷', '小霈', '小恩', '小元', '小穎', '小軒', '小宥', '小涵'];

  const SCAFFOLDS = {
    motherday: {
      label: '🌸 母親節',
      color: 'rose',
      prompts: [
        '媽媽長得很___。',
        '媽媽喜歡___。',
        '媽媽常常幫我___。',
        '我最喜歡媽媽___。',
        '媽媽很___，因為___。',
        '我想對媽媽說：謝謝你___。',
        '媽媽辛苦了，她每天___。',
        '我和媽媽一起___，很___。',
        '我要送媽媽___，讓她___。',
        '媽媽是世界上最___的人。',
      ]
    },
    outdoor: {
      label: '🌿 戶外教育',
      color: 'green',
      prompts: [
        '我們去了___。',
        '我看到了___，覺得很___。',
        '我覺得___很有趣。',
        '我最喜歡___，因為___。',
        '我和同學一起___。',
        '我學到了___。',
        '天氣很___，我感覺___。',
        '老師說___，我覺得___。',
        '下次我還想去___。',
        '這次校外教學，我很___。',
      ]
    }
  };

  const DEFAULT_ARTICLES = [
    {
      id: 1,
      title: '媽媽，謝謝您',
      author: '小安',
      titleTypo: { font: '', size: '' },
      imageUrl: '',
      imageSize: 'medium',
      content: '媽媽每天幫我準備早餐。\n媽媽很溫柔，也很勤勞。\n我最喜歡媽媽的笑容。\n我想對媽媽說：謝謝你每天照顧我。\n媽媽辛苦了，我愛你。'
    },
    {
      id: 2,
      title: '戶外教育真有趣',
      author: '小熙',
      titleTypo: { font: '', size: '' },
      imageUrl: '',
      imageSize: 'medium',
      content: '我們去了科學博物館。\n我看到了恐龍骨骼，覺得很酷。\n我最喜歡觸控螢幕，因為可以自己操作。\n我和同學一起玩尋寶遊戲。\n這次校外教學，我很開心。'
    },
    {
      id: 3,
      title: '我的好媽媽',
      author: '小愷',
      titleTypo: { font: '', size: '' },
      imageUrl: '',
      imageSize: 'small',
      content: '媽媽喜歡看書和做蛋糕。\n媽媽常常幫我梳頭髮。\n我要送媽媽一張卡片，讓她開心。\n媽媽是世界上最好的人。'
    }
  ];

  /* ───── App ───── */
  function App() {
    // Publication
    const [pubName, setPubName]         = useState('六年甲班小報');
    const [pubSubtitle, setPubSubtitle] = useState('CLASS TIMES');
    const [pubDate, setPubDate]         = useState('2026年5月11日');
    const [theme, setTheme]             = useState('retro');
    const [paperSize, setPaperSize]     = useState('A3'); // 'A3' or '8K'

    // Typography
    const [typo, setTypo] = useState({
      pubName:    { font: '', size: '' },
      pubSubtitle:{ font: '', size: '' },
      pubDate:    { font: '', size: '' },
      artAuthor:  { font: '', size: '' },
      artContent: { font: '', size: '' },
    });
    const [showTypo, setShowTypo] = useState(false);

    const fontOpts = [
      { label: '預設', value: '' },
      { label: '黑體', value: 'sans-serif' },
      { label: '明體', value: 'serif' },
      { label: '楷體', value: '"BiauKai","DFKai-SB","KaiTi","標楷體",serif' },
    ];
    const getTypoStyle  = (key) => {
      const s = {};
      if (typo[key]?.font) s.fontFamily = typo[key].font;
      if (typo[key]?.size) s.fontSize   = `${typo[key].size}px`;
      return s;
    };
    const getArtTitleStyle = (art) => {
      const s = {};
      if (art.titleTypo?.font) s.fontFamily = art.titleTypo.font;
      if (art.titleTypo?.size) s.fontSize   = `${art.titleTypo.size}px`;
      return s;
    };

    // Articles
    const [articles, setArticles] = useState(DEFAULT_ARTICLES);

    const addArticle = () => setArticles(prev => [
      ...prev,
      { id: Date.now(), title: '', author: '', content: '', imageUrl: '', imageSize: 'medium', titleTypo: { font: '', size: '' } }
    ]);
    const removeArticle  = (id) => { if (articles.length > 1) setArticles(prev => prev.filter(a => a.id !== id)); };
    const updateArticle  = useCallback((id, field, value) =>
      setArticles(prev => prev.map(a => a.id === id ? { ...a, [field]: value } : a)), []);
    const updateTitleTypo = (id, field, value) =>
      setArticles(prev => prev.map(a => a.id === id ? { ...a, titleTypo: { ...(a.titleTypo || { font:'', size:'' }), [field]: value } } : a));

    // Gallery / Albums — 預載 GitHub 母親節相片
    const GITHUB_BASE = 'https://raw.githubusercontent.com/marypingu213-code/classrooom-newspaper/main/mother%27s%20day/';
    const GITHUB_IMAGES = [
      { id: 'gh1', url: GITHUB_BASE + '1.jpg' },
      { id: 'gh2', url: GITHUB_BASE + '1.png' },
      { id: 'gh3', url: GITHUB_BASE + '2.jpg' },
      { id: 'gh4', url: GITHUB_BASE + '2.png' },
      { id: 'gh5', url: GITHUB_BASE + '3.jpg' },
      { id: 'gh6', url: GITHUB_BASE + '3.png' },
      { id: 'gh7', url: GITHUB_BASE + '4.png' },
    ];
    const [albums, setAlbums]           = useState([{ id: 'default', name: '母親節相片 (GitHub)', images: GITHUB_IMAGES }]);
    const [activeAlbum, setActiveAlbum] = useState('default');
    const [galleryOpen, setGalleryOpen] = useState(false);
    const [selectFor, setSelectFor]     = useState(null);
    const [editAlbumId, setEditAlbumId] = useState(null);
    const [editAlbumName, setEditAlbumName] = useState('');
    const galleryRef = useRef(null);

    const openGalleryFor  = (artId) => { setSelectFor(artId); setGalleryOpen(true); };
    const closeGallery    = ()       => { setSelectFor(null); setGalleryOpen(false); };
    const createAlbum     = () => {
      const id = Date.now().toString();
      setAlbums(prev => [...prev, { id, name: '新相簿', images: [] }]);
      setActiveAlbum(id);
      setEditAlbumId(id);
      setEditAlbumName('新相簿');
    };
    const saveAlbumName   = (id) => {
      if (editAlbumName.trim()) setAlbums(prev => prev.map(a => a.id === id ? { ...a, name: editAlbumName } : a));
      setEditAlbumId(null);
    };
    const deleteAlbum     = (id) => {
      if (albums.length <= 1) return;
      const next = albums.filter(a => a.id !== id);
      setAlbums(next);
      if (activeAlbum === id) setActiveAlbum(next[0].id);
    };
    const uploadToGallery = (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      const imgs = files.map(f => ({ id: Math.random().toString(), url: URL.createObjectURL(f) }));
      setAlbums(prev => prev.map(a => a.id === activeAlbum ? { ...a, images: [...a.images, ...imgs] } : a));
      if (galleryRef.current) galleryRef.current.value = '';
    };
    const selectFromGallery = (url) => {
      if (selectFor) { updateArticle(selectFor, 'imageUrl', url); updateArticle(selectFor, 'imageSize', 'medium'); }
      closeGallery();
      showToast('✅ 照片已加入報紙！');
    };
    const deleteGalleryImg = (albumId, imgId) =>
      setAlbums(prev => prev.map(a => a.id === albumId ? { ...a, images: a.images.filter(i => i.id !== imgId) } : a));

    // Direct upload per article
    const directUpload = (artId, e) => {
      const file = e.target.files[0];
      if (!file) return;
      updateArticle(artId, 'imageUrl', URL.createObjectURL(file));
      updateArticle(artId, 'imageSize', 'medium');
      showToast('✅ 照片已加入報紙！');
      e.target.value = '';
    };

    // Voice input
    const [isListening,  setIsListening]  = useState(false);
    const [voiceTarget,  setVoiceTarget]  = useState(null);
    const recognitionRef = useRef(null);

    const startVoice = (artId, field) => {
      if (isListening) { recognitionRef.current?.stop(); return; }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { showToast('⚠️ 請使用 Chrome 或 Edge 瀏覽器以支援語音輸入'); return; }
      const rec = new SR();
      rec.lang = 'zh-TW';
      rec.continuous   = (field === 'content');
      rec.interimResults = false;
      rec.onstart  = () => { setIsListening(true);  setVoiceTarget({ artId, field }); };
      rec.onend    = () => { setIsListening(false); setVoiceTarget(null); };
      rec.onerror  = () => { setIsListening(false); setVoiceTarget(null); showToast('⚠️ 語音辨識失敗，請再試一次'); };
      rec.onresult = (ev) => {
        const text = Array.from(ev.results).slice(ev.resultIndex).map(r => r[0].transcript).join('');
        setArticles(prev => prev.map(a => {
          if (a.id !== artId) return a;
          if (field === 'title')   return { ...a, title: text };
          if (field === 'content') return { ...a, content: (a.content ? a.content + '\n' : '') + text };
          return a;
        }));
      };
      recognitionRef.current = rec;
      rec.start();
    };
    const stopVoice = () => recognitionRef.current?.stop();

    // Scaffold
    const [scaffoldOpen, setScaffoldOpen] = useState({});
    const [scaffoldTab,  setScaffoldTab]  = useState({});

    const toggleScaffold = (id) => {
      setScaffoldOpen(prev => ({ ...prev, [id]: !prev[id] }));
      setScaffoldTab(prev => prev[id] ? prev : { ...prev, [id]: 'motherday' });
    };
    const addScaffold = (artId, text) =>
      setArticles(prev => prev.map(a => a.id === artId ? { ...a, content: (a.content ? a.content + '\n' : '') + text } : a));

    // Toast
    const [toast, setToast] = useState('');
    const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

    // Save / Load — JSON 檔案匯出入（換電腦也能用）+ localStorage 備份
    const getSnapshot = () => ({ pubName, pubSubtitle, pubDate, typo, articles, theme, paperSize });

    const saveDraft = () => {
      // 同時存 localStorage（當台電腦快速存取）
      localStorage.setItem('np_draft_v3', JSON.stringify(getSnapshot()));
      // 並下載 .json 檔案（跨電腦攜帶）
      const blob = new Blob([JSON.stringify(getSnapshot(), null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `班級小報_${pubDate.replace(/[年月日]/g,'')}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('💾 已下載進度檔，換電腦時載入即可！');
    };

    const loadDraftLocal = () => {
      const raw = localStorage.getItem('np_draft_v3');
      if (!raw) { showToast('📂 此電腦沒有暫存資料，請改用「載入檔案」。'); return; }
      try {
        const p = JSON.parse(raw);
        if (p.pubName)     setPubName(p.pubName);
        if (p.pubSubtitle) setPubSubtitle(p.pubSubtitle);
        if (p.pubDate)     setPubDate(p.pubDate);
        if (p.typo)        setTypo(p.typo);
        if (p.articles)    setArticles(p.articles);
        if (p.theme)       setTheme(p.theme);
        if (p.paperSize)   setPaperSize(p.paperSize);
        showToast('✅ 已從此電腦載入上次進度！');
      } catch { showToast('❌ 讀取失敗，存檔資料有誤。'); }
    };

    const jsonInputRef = useRef(null);
    const loadDraftFile = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const p = JSON.parse(ev.target.result);
          if (p.pubName)     setPubName(p.pubName);
          if (p.pubSubtitle) setPubSubtitle(p.pubSubtitle);
          if (p.pubDate)     setPubDate(p.pubDate);
          if (p.typo)        setTypo(p.typo);
          if (p.articles)    setArticles(p.articles);
          if (p.theme)       setTheme(p.theme);
          if (p.paperSize)   setPaperSize(p.paperSize);
          // 同步存到 localStorage
          localStorage.setItem('np_draft_v3', JSON.stringify(p));
          showToast('✅ 已從檔案載入進度！');
        } catch { showToast('❌ 檔案格式有誤，請選正確的 .json 進度檔。'); }
      };
      reader.readAsText(file);
      if (jsonInputRef.current) jsonInputRef.current.value = '';
    };

    /* ── Render content (newspaper columns) ── */
    const renderContent = (content, th, imgUrl, imgSize) => {
      const paras = (content || '').split('\n');
      let firstValid = true;
      
      const rendered = paras.map((p, i) => {
        if (!p.trim()) return <div key={i} className="h-3" />;
        let dc = '';
        
        // 【變更點 4】只有電子報主題才會有內文首字放大
        if (firstValid && th === 'newsletter') {
          dc = 'first-letter:text-4xl first-letter:font-bold first-letter:text-rose-500 first-letter:float-left first-letter:mr-2 first-letter:mt-[-0.1em] first-letter:leading-none';
          firstValid = false;
        } else if (firstValid) {
          // 消耗掉 firstValid 狀態，確保其他段落不會被誤判
          firstValid = false;
        }
        return <p key={i} className={`mb-3 ${dc}`}>{p}</p>;
      });

      if (!imgUrl) return <div className="clearfix">{rendered}</div>;

      if (th === 'retro' || th === 'modern') {
        const base = th === 'retro'
          ? 'border-[5px] border-double border-stone-800 p-1 sepia-[.4] grayscale-[.5] shadow-sm object-cover'
          : 'grayscale border border-zinc-300 shadow-sm object-cover';
        const cls = imgSize === 'small' ? `float-left w-1/3 mr-4 mb-2 ${base}`
                  : imgSize === 'large' ? `block w-full mb-4 ${base}`
                  : `float-right w-1/2 ml-5 mb-3 ${base}`;
        return <div className="clearfix"><img src={imgUrl} alt="配圖" className={cls} onError={e=>e.target.style.display='none'} />{rendered}</div>;
      }
      if (th === 'newsletter') {
        const cls = imgSize === 'small' ? 'w-1/2 rounded-lg mx-auto block object-cover shadow-md mb-6'
                  : imgSize === 'large' ? 'w-full rounded-2xl object-cover shadow-md mb-6 h-64'
                  : 'w-3/4 rounded-xl mx-auto block object-cover shadow-md mb-6';
        return <React.Fragment><img src={imgUrl} alt="配圖" className={cls} onError={e=>e.target.style.display='none'} />{rendered}</React.Fragment>;
      }
      return <div className="clearfix">{rendered}</div>;
    };

    /* ── Mic Button ── */
    const MicBtn = ({ artId, field }) => {
      const active = isListening && voiceTarget?.artId === artId && voiceTarget?.field === field;
      return (
        <button
          onClick={() => active ? stopVoice() : startVoice(artId, field)}
          title={active ? '點擊停止錄音' : field === 'title' ? '語音輸入標題' : '語音輸入內文（說完一句後自動斷句）'}
          className={`shrink-0 w-9 h-9 rounded-lg flex items-center justify-center transition-all ${active ? 'bg-red-500 text-white mic-listening' : 'bg-gray-100 text-gray-500 hover:bg-indigo-100 hover:text-indigo-600'}`}
        >
          <i className={`fas ${active ? 'fa-stop' : 'fa-microphone'} text-[15px]`}></i>
        </button>
      );
    };

    /* ── Newspaper Preview: Retro ── */
    const RetroPreview = () => (
      <div className={`bg-[#f4ebd8] text-stone-900 font-serif p-8 md:p-12 border border-stone-300 w-full shadow-xl print:shadow-none print:border-none relative ${paperSize === 'A3' ? 'max-w-[420mm] min-h-[297mm]' : 'max-w-[390mm] min-h-[270mm]'}`}>
        <div className="absolute left-1/2 top-0 bottom-0 border-l-2 border-dashed border-stone-400/30 print:hidden pointer-events-none transform -translate-x-1/2 z-0"></div>
        
        {/* 【變更點 1】 text-left 讓刊物名稱靠左對齊 */}
        <div className="text-left border-b-[6px] border-double border-stone-800 pb-6 mb-8 relative z-10 w-full">
          {pubSubtitle && <div className="text-lg tracking-[0.4em] font-bold text-stone-600 mb-3" style={getTypoStyle('pubSubtitle')}>【 {pubSubtitle} 】</div>}
          <h1 className="text-6xl md:text-8xl font-black mb-6 text-stone-900 tracking-widest" style={getTypoStyle('pubName')}>{pubName}</h1>
          
          <div className="flex justify-between items-center text-sm border-t-2 border-b-2 border-stone-800 py-2 px-2 font-bold uppercase tracking-wider">
            {/* 【變更點 2】 母親節特刊移到左側 */}
            <div className="flex gap-4">
              <span>🌸 母親節特刊 × 戶外教育 🌿</span>
            </div>
            {/* 【變更點 3】 發行日期移到右側與收錄篇數並排 */}
            <div className="flex gap-6 text-right">
              <span style={getTypoStyle('pubDate')}>發行日期：{pubDate}</span>
              <span>收錄：{articles.length} 篇</span>
            </div>
          </div>
        </div>

        <div className="columns-2 md:columns-3 lg:columns-4 gap-8 text-justify text-[15px] leading-relaxed relative z-10" style={getTypoStyle('artContent')}>
          {articles.map(a => (
            <div key={a.id} className="break-inside-avoid mb-10 pb-6 border-b-2 border-dotted border-stone-400/60">
              <h2 className="text-2xl font-black mb-2 leading-snug border-t-[3px] border-stone-800 pt-2" style={getArtTitleStyle(a)}>{a.title || '（未填標題）'}</h2>
              <div className="text-stone-600 font-bold mb-3 tracking-wide text-sm" style={getTypoStyle('artAuthor')}>
                撰文 / {a.author || '（未填作者）'}
              </div>
              {renderContent(a.content, 'retro', a.imageUrl, a.imageSize)}
            </div>
          ))}
        </div>
      </div>
    );

    /* ── Newspaper Preview: Modern ── */
    const ModernPreview = () => (
      <div className={`bg-white text-zinc-900 font-sans p-8 md:p-12 w-full shadow-xl print:shadow-none relative ${paperSize === 'A3' ? 'max-w-[420mm] min-h-[297mm]' : 'max-w-[390mm] min-h-[270mm]'}`}>
        <div className="absolute left-1/2 top-0 bottom-0 border-l-2 border-dashed border-zinc-200 print:hidden pointer-events-none transform -translate-x-1/2 z-0"></div>
        
        {/* 【變更點 1】 text-left 讓刊物名稱靠左對齊 */}
        <div className="text-left border-b-[8px] border-zinc-900 pb-5 mb-10 relative z-10">
          <div className="text-sm font-black text-zinc-500 uppercase tracking-[0.3em] mb-2" style={getTypoStyle('pubSubtitle')}>{pubSubtitle}</div>
          <h1 className="text-7xl md:text-9xl font-black tracking-tighter leading-none mb-6" style={getTypoStyle('pubName')}>{pubName}</h1>
          
          <div className="flex justify-between items-center text-sm font-bold text-zinc-600 border-t-2 border-zinc-200 pt-3 uppercase tracking-widest">
            {/* 【變更點 2】 母親節特刊移到左側 */}
            <span className="text-zinc-800">🌸 母親節 × 戶外教育特刊 🌿</span>
            {/* 【變更點 3】 發行日期移到右側 */}
            <div className="flex items-center gap-4">
              <span style={getTypoStyle('pubDate')}>發行日期：{pubDate}</span>
              <span className="bg-zinc-900 text-white px-3 py-1">收錄：{articles.length} 篇</span>
            </div>
          </div>
        </div>

        <div className="columns-2 md:columns-3 lg:columns-4 gap-8 text-justify text-base leading-relaxed relative z-10" style={getTypoStyle('artContent')}>
          {articles.map(a => (
            <div key={a.id} className="break-inside-avoid mb-12 pb-8 border-b-[3px] border-zinc-100">

                          <div className="relative group/img w-16 h-16 rounded-xl overflow-hidden border border-gray-200 shadow-sm shrink-0">
                            <img src={art.imageUrl} className="w-full h-full object-cover" alt="配圖" onError={e => e.target.style.display='none'} />
                            <button onClick={() => updateArticle(art.id, 'imageUrl', '')} className="absolute inset-0 bg-black/60 text-white flex items-center justify-center opacity-0 group-hover/img:opacity-100 transition-opacity rounded-xl">
                              <i className="fas fa-times-circle text-[20px]"></i>
                            </button>
                          </div>
                        ) : (
                          <div className="w-16 h-16 rounded-xl border-2 border-dashed border-gray-200 bg-gray-50 flex items-center justify-center text-gray-300 shrink-0">
                            <i className="fas fa-image text-[22px]"></i>
                          </div>
                        )}

                        <div className="flex flex-col gap-1.5 flex-1 min-w-0">
                          {/* Direct upload — primary */}
                          <label className="cursor-pointer flex items-center justify-center gap-2 px-3 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 transition-colors shadow-sm">
                            <i className="fas fa-upload text-[12px]"></i> 直接上傳照片到報紙
                            <input type="file" accept="image/*" className="hidden" onChange={e => directUpload(art.id, e)} />
                          </label>
                          {/* Gallery */}
                          <button onClick={() => openGalleryFor(art.id)} className="flex items-center justify-center gap-1.5 px-3 py-1.5 bg-white text-gray-600 rounded-lg text-xs font-semibold hover:bg-gray-100 transition-colors border border-gray-200">
                            <i className="fas fa-images text-[12px]"></i> 從相片集選擇
                          </button>
                        </div>
                      </div>

                      {/* Size selector */}
                      {art.imageUrl && (
                        <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-200">
                          <span className="text-xs font-semibold text-gray-600 shrink-0">照片大小：</span>
                          <div className="flex gap-1 flex-1">
                            {[['small','小'], ['medium','中'], ['large','大']].map(([v, l]) => (
                              <button key={v} onClick={() => updateArticle(art.id, 'imageSize', v)}
                                className={`flex-1 text-xs py-1 rounded-lg transition-colors border font-semibold ${art.imageSize === v ? 'bg-indigo-600 text-white border-indigo-700' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'}`}>
                                {l}圖
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                  </div>
                ))}
              </div>

              <button onClick={addArticle} className="mt-4 w-full flex items-center justify-center gap-2 py-3 border-2 border-dashed border-pink-300 text-pink-600 rounded-xl hover:bg-pink-50 font-bold text-sm transition-colors bg-white">
                <i className="fas fa-plus text-[15px]"></i> 新增一篇作品
              </button>
            </div>

            {/* Gallery shortcut */}
            <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
              <div className="flex justify-between items-center">
                <span className="text-xs font-bold text-indigo-800 flex items-center gap-1.5"><i className="fas fa-folder text-[13px]"></i> 班級相片集管理</span>
                <button onClick={() => { setSelectFor(null); setGalleryOpen(true); }} className="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-colors flex items-center gap-1 shadow-sm font-semibold">
                  <i className="fas fa-images text-[12px]"></i> 管理相片
                </button>
              </div>
            </div>

          </div>{/* end flex-grow */}

          {/* Bottom bar */}
          <div className="p-4 bg-gray-50 border-t border-gray-100 shrink-0 flex flex-col gap-2.5">
            {/* 隱藏的 JSON 檔案輸入 */}
            <input type="file" accept=".json" className="hidden" ref={jsonInputRef} onChange={loadDraftFile} />

            {/* 說明文字 */}
            <p className="text-[11px] text-gray-400 text-center leading-snug">
              💡 <span className="font-semibold text-gray-500">換電腦</span>請用「匯出」帶走 .json，到新電腦「載入檔案」即可還原
            </p>

            {/* 第一排：匯出 + 載入兩種方式 */}
            <div className="flex gap-2">
              <button onClick={saveDraft}
                className="flex-1 flex items-center justify-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors shadow-sm">
                <i className="fas fa-file-export text-[13px]"></i> 匯出進度
              </button>
              <button onClick={() => jsonInputRef.current?.click()}
                className="flex-1 flex items-center justify-center gap-1.5 bg-white border-2 border-emerald-400 text-emerald-700 hover:bg-emerald-50 font-bold py-2.5 rounded-lg text-sm transition-colors">
                <i className="fas fa-file-import text-[13px]"></i> 載入檔案
              </button>
            </div>

            {/* 第二排：此電腦快速讀取 */}
            <button onClick={loadDraftLocal}
              className="w-full flex items-center justify-center gap-1.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-600 font-semibold py-2 rounded-lg text-xs transition-colors">
              <i className="fas fa-desktop text-[12px]"></i> 讀取此電腦的暫存
            </button>

            {/* 第三排：列印 */}
            <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-rose-500 to-orange-400 hover:from-rose-600 hover:to-orange-500 text-white font-bold py-3 rounded-xl transition-all shadow-md">
              <i className="fas fa-print text-[18px]"></i> 列印 / 匯出 PDF
            </button>
          </div>

        </div>{/* end left panel */}

        {/* ═══════════════ RIGHT PREVIEW ═══════════════ */}
        <div className="w-full flex-1 p-4 md:p-8 overflow-y-auto bg-slate-200 print:bg-transparent print:w-full print:p-0 print:overflow-visible">
          <div className="mx-auto drop-shadow-2xl print:drop-shadow-none print:w-full flex justify-center transition-all">
            {theme === 'retro'      && <RetroPreview />}
            {theme === 'modern'     && <ModernPreview />}
            {theme === 'newsletter' && <NewsletterPreview />}
          </div>
        </div>

        {/* Gallery Modal */}
        {galleryOpen && <GalleryModal />}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
