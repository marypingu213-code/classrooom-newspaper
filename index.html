<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生作品排版產生器</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel (用來在瀏覽器中編譯 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 強制列印時保留背景顏色與圖片，讓復古底色等設計完美呈現 */
    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    function App() {
      // 刊物整體設定
      const [pubName, setPubName] = useState('班級校園快報');
      const [pubSubtitle, setPubSubtitle] = useState('STUDENT TIMES');
      const [pubDate, setPubDate] = useState('2026年5月8日');
      
      // 字型與大小進階設定
      const [showTypoSettings, setShowTypoSettings] = useState(false);
      const [typo, setTypo] = useState({
        pubName: { font: '', size: '' },
        pubSubtitle: { font: '', size: '' },
        pubDate: { font: '', size: '' },
        artAuthor: { font: '', size: '' },
        artContent: { font: '', size: '' },
      });

      const fontOptions = [
        { label: '預設 (隨主題)', value: '' },
        { label: '黑體 (Sans-serif)', value: 'sans-serif' },
        { label: '明體 (Serif)', value: 'serif' },
        { label: '楷體 (KaiTi)', value: '"BiauKai", "DFKai-SB", "KaiTi", "標楷體", serif' },
      ];

      const handleTypoChange = (key, field, value) => {
        setTypo(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
      };

      const getTypoStyle = (key) => {
        const style = {};
        if (typo[key].font) style.fontFamily = typo[key].font;
        if (typo[key].size) style.fontSize = `${typo[key].size}px`;
        return style;
      };

      const getArticleTitleStyle = (article) => {
        const style = {};
        if (article.titleTypo?.font) style.fontFamily = article.titleTypo.font;
        if (article.titleTypo?.size) style.fontSize = `${article.titleTypo.size}px`;
        return style;
      };

      // ================= 相片集狀態管理 =================
      const [albums, setAlbums] = useState([
        {
          id: 'default',
          name: '戶外教學相片',
          images: [
            { id: 'img1', url: 'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=800&auto=format&fit=crop' }
          ]
        }
      ]);
      const [activeAlbumId, setActiveAlbumId] = useState('default');
      const [isGalleryOpen, setIsGalleryOpen] = useState(false);
      const [selectingForArticle, setSelectingForArticle] = useState(null);
      const [editingAlbumId, setEditingAlbumId] = useState(null);
      const [editAlbumName, setEditAlbumName] = useState('');
      const fileInputRef = useRef(null);

      const handleCreateAlbum = () => {
        const newId = Date.now().toString();
        setAlbums([...albums, { id: newId, name: '新子相簿', images: [] }]);
        setActiveAlbumId(newId);
        setEditingAlbumId(newId);
        setEditAlbumName('新子相簿');
      };

      const handleSaveAlbumName = (id) => {
        if (!editAlbumName.trim()) return setEditingAlbumId(null);
        setAlbums(albums.map(a => a.id === id ? { ...a, name: editAlbumName } : a));
        setEditingAlbumId(null);
      };

      const handleDeleteAlbum = (id) => {
        if (albums.length === 1) return;
        const newAlbums = albums.filter(a => a.id !== id);
        setAlbums(newAlbums);
        if (activeAlbumId === id) setActiveAlbumId(newAlbums[0].id);
      };

      const handleUploadImages = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        const newImages = files.map(f => ({
          id: Math.random().toString(),
          url: URL.createObjectURL(f)
        }));
        setAlbums(albums.map(a => a.id === activeAlbumId ? { ...a, images: [...a.images, ...newImages] } : a));
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const handleSelectImage = (url) => {
        if (selectingForArticle) {
          updateArticle(selectingForArticle, 'imageUrl', url);
          setIsGalleryOpen(false);
          setSelectingForArticle(null);
        }
      };

      const handleDeleteImage = (albumId, imageId) => {
        setAlbums(albums.map(a => a.id === albumId ? { ...a, images: a.images.filter(img => img.id !== imageId) } : a));
      };
      
      // ================= 多篇文章內容 =================
      const [articles, setArticles] = useState([
        {
          id: 1,
          title: '春季校外教學見聞',
          author: '六年甲班 王小明',
          titleTypo: { font: '', size: '' },
          imageUrl: 'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=800&auto=format&fit=crop',
          content: `今天天氣晴朗，我們全班一起搭上遊覽車，前往期待已久的自然科學博物館。一路上，大家有說有笑，車廂裡充滿了歡樂的氣氛。\n\n到達博物館後，首先映入眼簾的是巨大的恐龍骨骼化石。導覽員詳細地解說了恐龍的生態與滅絕的原因，讓我對這些史前巨獸有了更深的認識。接著，我們參觀了宇宙科學展區，體驗了模擬無重力狀態的設施，感覺自己就像個真正的太空人。\n\n下午，我們在植物園區進行了尋寶遊戲。透過學習單上的提示，我們仔細觀察各種植物的特徵，不僅學到了豐富的植物知識，也體會到了團隊合作的重要性。\n\n這次的校外教學讓我收穫滿滿，不但增廣了見聞，也和同學們留下了美好的回憶。我希望下次還能有機會再來這裡探索更多科學的奧秘。`
        },
        {
          id: 2,
          title: '難忘的科博館之旅',
          author: '六年甲班 林小華',
          titleTypo: { font: '', size: '' },
          imageUrl: '',
          content: `這次的校外教學令我印象最深刻的是「生命科學廳」。在那裡，我們看到了人類演化的過程，從早期的猿人到現代智人，每一個階段的模型都做得栩栩如生。\n\n此外，我們還觀賞了立體劇場的自然生態影片。戴上特製的眼鏡後，螢幕上的動物彷彿就在我們眼前跳躍，那種身歷其境的感覺真是太震撼了！這次不僅玩得開心，也學到了課本以外的寶貴知識。`
        }
      ]);
      
      const [theme, setTheme] = useState('retro'); // 'retro', 'modern', 'newsletter'

      const handlePrint = () => window.print();

      const addArticle = () => {
        setArticles([...articles, { id: Date.now(), title: '', author: '', content: '', imageUrl: '', titleTypo: { font: '', size: '' } }]);
      };

      const removeArticle = (idToRemove) => {
        if (articles.length === 1) return; 
        setArticles(articles.filter(art => art.id !== idToRemove));
      };

      const updateArticle = (id, field, value) => {
        setArticles(articles.map(art => art.id === id ? { ...art, [field]: value } : art));
      };

      const updateArticleTitleTypo = (id, field, value) => {
        setArticles(articles.map(art => art.id === id ? { ...art, titleTypo: { ...(art.titleTypo || { font: '', size: '' }), [field]: value } } : art));
      };

      // 處理文章段落與圖片排版
      const renderContent = (contentStr, currentTheme, imageUrl = '') => {
        const paragraphs = contentStr.split('\n');
        let isFirstValidPara = true;

        const renderedParagraphs = paragraphs.map((paragraph, index) => {
          if (!paragraph.trim()) {
            return <div key={index} className="h-4" />;
          }
          let dropCapClass = '';
          if (isFirstValidPara && currentTheme === 'retro') {
            dropCapClass = 'first-letter:text-6xl first-letter:font-bold first-letter:text-stone-800 first-letter:float-left first-letter:mr-2 first-letter:mt-[-0.1em] first-letter:leading-none';
            isFirstValidPara = false;
          }
          return (
            <p key={index} className={`mb-4 ${dropCapClass}`}>
              {paragraph}
            </p>
          );
        });

        if (imageUrl) {
          if (currentTheme === 'retro') {
            return (
              <React.Fragment>
                <img src={imageUrl} alt="配圖" className="float-left md:float-right w-full md:w-[45%] md:ml-6 mb-4 border-[6px] border-double border-stone-800 p-1 sepia-[.4] grayscale-[.5] shadow-sm object-cover max-h-[400px] break-inside-avoid" />
                {renderedParagraphs}
              </React.Fragment>
            );
          } else if (currentTheme === 'modern') {
            return (
              <React.Fragment>
                <img src={imageUrl} alt="配圖" className="w-full mb-6 grayscale border border-zinc-300 shadow-sm object-cover max-h-[500px] break-inside-avoid" />
                {renderedParagraphs}
              </React.Fragment>
            );
          } else if (currentTheme === 'newsletter') {
            return (
              <React.Fragment>
                <img src={imageUrl} alt="配圖" className="w-full h-64 md:h-96 object-cover rounded-xl mb-8 shadow-md" />
                {renderedParagraphs}
              </React.Fragment>
            );
          }
        }

        return <React.Fragment>{renderedParagraphs}</React.Fragment>;
      };

      return (
        <div className="min-h-screen bg-gray-100 flex flex-col md:flex-row font-sans">
          
          {/* 左側：控制面板 (列印時隱藏) */}
          <div className="w-full md:w-1/3 lg:w-1/4 bg-white shadow-lg z-10 flex flex-col print:hidden h-screen overflow-y-auto">
            <div className="p-6 bg-blue-600 text-white shrink-0">
              <h1 className="text-xl font-bold flex items-center gap-2">
                <i className="fas fa-layer-group text-[24px]"></i>
                作品排版產生器
              </h1>
              <p className="text-sm text-blue-100 mt-2">將多位學生的文字轉換為精美版面</p>
            </div>

            <div className="p-6 flex-grow flex flex-col gap-6">
              {/* 主題選擇 */}
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-3">選擇排版風格</label>
                <div className="grid grid-cols-1 gap-3">
                  <button onClick={() => setTheme('retro')} className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all ${theme === 'retro' ? 'border-amber-700 bg-amber-50 text-amber-900' : 'border-gray-200 hover:border-amber-300'}`}>
                    <i className={`fas fa-newspaper text-[20px] ${theme === 'retro' ? 'text-amber-700' : 'text-gray-500'}`}></i>
                    <div className="text-left">
                      <div className="font-bold">復古報紙</div>
                      <div className="text-xs opacity-70">泛黃紙張、雙欄圖文圍繞</div>
                    </div>
                  </button>

                  <button onClick={() => setTheme('modern')} className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all ${theme === 'modern' ? 'border-zinc-800 bg-zinc-50 text-zinc-900' : 'border-gray-200 hover:border-zinc-300'}`}>
                    <i className={`fas fa-layer-group text-[20px] ${theme === 'modern' ? 'text-zinc-800' : 'text-gray-500'}`}></i>
                    <div className="text-left">
                      <div className="font-bold">現代報紙</div>
                      <div className="text-xs opacity-70">黑白紀實攝影、多欄排版</div>
                    </div>
                  </button>

                  <button onClick={() => setTheme('newsletter')} className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all ${theme === 'newsletter' ? 'border-blue-600 bg-blue-50 text-blue-900' : 'border-gray-200 hover:border-blue-300'}`}>
                    <i className={`fas fa-envelope-open-text text-[20px] ${theme === 'newsletter' ? 'text-blue-600' : 'text-gray-500'}`}></i>
                    <div className="text-left">
                      <div className="font-bold">電子報 (EDM)</div>
                      <div className="text-xs opacity-70">置中閱讀、大圖焦點風格</div>
                    </div>
                  </button>
                </div>
              </div>

              <hr className="border-gray-200" />

              {/* 內容輸入區塊 */}
              <div className="space-y-6">
                
                {/* 整體刊物設定 */}
                <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 space-y-3">
                  <h3 className="font-bold text-blue-900 flex items-center gap-2 mb-2">
                    <i className="fas fa-book-open text-[18px]"></i> 刊物總設定
                  </h3>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs font-semibold text-blue-800 mb-1">刊物名稱</label>
                      <input type="text" value={pubName} onChange={(e) => setPubName(e.target.value)} className="w-full p-2 text-sm border border-blue-200 rounded outline-none bg-white focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs font-semibold text-blue-800 mb-1">英文/副標題</label>
                      <input type="text" value={pubSubtitle} onChange={(e) => setPubSubtitle(e.target.value)} className="w-full p-2 text-sm border border-blue-200 rounded outline-none bg-white focus:ring-2 focus:ring-blue-500" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-blue-800 mb-1">發行日期</label>
                    <input type="text" value={pubDate} onChange={(e) => setPubDate(e.target.value)} className="w-full p-2 text-sm border border-blue-200 rounded outline-none bg-white focus:ring-2 focus:ring-blue-500" />
                  </div>
                </div>

                {/* 字型與大小進階設定 */}
                <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-3">
                  <button onClick={() => setShowTypoSettings(!showTypoSettings)} className="w-full flex justify-between items-center font-bold text-gray-700 hover:text-blue-600 transition-colors">
                    <span className="flex items-center gap-2"><i className="fas fa-cog text-[18px]"></i> 字型與大小進階設定</span>
                    {showTypoSettings ? <i className="fas fa-chevron-up text-[18px]"></i> : <i className="fas fa-chevron-down text-[18px]"></i>}
                  </button>
                  
                  {showTypoSettings && (
                    <div className="space-y-3 pt-3 border-t border-gray-200 mt-2">
                       {[
                         { label: '刊物名稱', key: 'pubName' },
                         { label: '英文/副標', key: 'pubSubtitle' },
                         { label: '發行日期', key: 'pubDate' },
                         { label: '作品作者', key: 'artAuthor' },
                         { label: '作品內文', key: 'artContent' }
                       ].map(item => (
                         <div key={item.key} className="flex items-center justify-between gap-2">
                           <label className="text-xs font-semibold text-gray-600 w-16 shrink-0">{item.label}</label>
                           <select className="flex-1 p-1.5 text-xs border border-gray-300 rounded outline-none focus:border-blue-400" value={typo[item.key].font} onChange={(e) => handleTypoChange(item.key, 'font', e.target.value)}>
                             {fontOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                           </select>
                           <div className="flex items-center gap-1 w-20 shrink-0">
                             <input type="number" className="w-full p-1.5 text-xs border border-gray-300 rounded outline-none focus:border-blue-400" placeholder="預設" value={typo[item.key].size} onChange={(e) => handleTypoChange(item.key, 'size', e.target.value)} />
                             <span className="text-xs text-gray-500">px</span>
                           </div>
                         </div>
                       ))}
                    </div>
                  )}
                </div>

                {/* 相片管理入口 */}
                <div className="bg-indigo-50 p-4 rounded-lg border border-indigo-100 space-y-3">
                  <div className="flex justify-between items-center">
                    <h3 className="font-bold text-indigo-900 flex items-center gap-2">
                      <i className="fas fa-folder text-[18px]"></i> 班級相片集管理
                    </h3>
                    <button onClick={() => { setSelectingForArticle(null); setIsGalleryOpen(true); }} className="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded hover:bg-indigo-700 transition-colors flex items-center gap-1 shadow-sm">
                      <i className="fas fa-images text-[14px]"></i> 管理相片
                    </button>
                  </div>
                  <p className="text-xs text-indigo-700 leading-relaxed">您可以先上傳活動照片，稍後在下方為個別學生的作品選擇專屬配圖。</p>
                </div>

                {/* 多篇文章列表 */}
                <div>
                  <div className="flex justify-between items-center mb-3">
                    <label className="text-sm font-semibold text-gray-700">學生作品列表</label>
                    <span className="text-xs font-medium text-blue-600 bg-blue-100 px-2 py-1 rounded-full">共 {articles.length} 篇</span>
                  </div>

                  <div className="space-y-4">
                    {articles.map((article, index) => (
                      <div key={article.id} className="p-4 bg-white border border-gray-200 rounded-lg shadow-sm relative group transition-all hover:border-blue-300 flex flex-col gap-3">
                        <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                          <button onClick={() => removeArticle(article.id)} className="p-1.5 text-red-500 hover:bg-red-50 hover:text-red-600 rounded transition-colors" title="刪除此篇作品">
                            <i className="fas fa-trash-alt text-[16px]"></i>
                          </button>
                        </div>
                        
                        <div className="text-xs font-bold text-gray-400 uppercase tracking-wider border-b pb-2 flex items-center gap-2">
                          <span className="bg-gray-100 text-gray-500 px-2 py-0.5 rounded">#{index + 1}</span>
                        </div>

                        {/* 標題與樣式 */}
                        <div>
                          <div className="flex justify-between items-end mb-1">
                            <label className="flex items-center gap-2 text-xs font-semibold text-gray-600">
                              <i className="fas fa-font text-[14px]"></i> 標題
                            </label>
                            <div className="flex items-center gap-1">
                              <select className="p-1 text-[10px] border border-gray-300 rounded outline-none focus:border-blue-400 bg-gray-50" value={article.titleTypo?.font || ''} onChange={(e) => updateArticleTitleTypo(article.id, 'font', e.target.value)}>
                                {fontOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label.split(' ')[0]}</option>)}
                              </select>
                              <input type="number" className="w-12 p-1 text-[10px] border border-gray-300 rounded outline-none focus:border-blue-400 bg-gray-50" placeholder="大小" value={article.titleTypo?.size || ''} onChange={(e) => updateArticleTitleTypo(article.id, 'size', e.target.value)} />
                            </div>
                          </div>
                          <input type="text" value={article.title} onChange={(e) => updateArticle(article.id, 'title', e.target.value)} className="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none" placeholder="輸入文章標題..." />
                        </div>
                        
                        {/* 作者 */}
                        <div>
                          <label className="flex items-center gap-2 text-xs font-semibold text-gray-600 mb-1">
                            <i className="fas fa-user text-[14px]"></i> 作者/班級
                          </label>
                          <input type="text" value={article.author} onChange={(e) => updateArticle(article.id, 'author', e.target.value)} className="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none" placeholder="例如：王小明" />
                        </div>

                        {/* 內文 */}
                        <div>
                          <label className="flex items-center gap-2 text-xs font-semibold text-gray-600 mb-1">
                            <i className="fas fa-font text-[14px]"></i> 內文
                          </label>
                          <textarea value={article.content} onChange={(e) => updateArticle(article.id, 'content', e.target.value)} rows={4} className="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none resize-y" placeholder="在此貼上學生的文章內容..."></textarea>
                        </div>

                        {/* 專屬配圖選擇器 */}
                        <div className="pt-3 border-t border-gray-100 flex items-center justify-between mt-1">
                          <div className="flex items-center gap-3">
                            {article.imageUrl ? (
                              <div className="relative group/img w-14 h-14 rounded-md overflow-hidden border border-gray-200 shadow-sm shrink-0">
                                <img src={article.imageUrl} className="w-full h-full object-cover" alt="已選配圖" />
                                <button onClick={() => updateArticle(article.id, 'imageUrl', '')} className="absolute inset-0 bg-black/60 text-white flex items-center justify-center opacity-0 group-hover/img:opacity-100 transition-opacity" title="移除配圖">
                                  <i className="fas fa-times-circle text-[20px]"></i>
                                </button>
                              </div>
                            ) : (
                              <div className="w-14 h-14 rounded-md border-2 border-dashed border-gray-200 bg-gray-50 flex items-center justify-center text-gray-400 shrink-0">
                                <i className="fas fa-image text-[20px]"></i>
                              </div>
                            )}
                            <div className="flex flex-col">
                              <span className="text-xs font-semibold text-gray-700">{article.imageUrl ? '已套用專屬配圖' : '僅顯示純文字'}</span>
                              <span className="text-[10px] text-gray-500">{article.imageUrl ? '游標移至圖片可移除' : '點擊右方按鈕可選擇圖片'}</span>
                            </div>
                          </div>
                          <button onClick={() => { setSelectingForArticle(article.id); setIsGalleryOpen(true); }} className="px-3 py-2 bg-indigo-50 text-indigo-700 rounded-md text-xs font-bold hover:bg-indigo-100 flex items-center gap-1 transition-colors border border-indigo-200">
                            <i className="fas fa-images text-[14px]"></i> {article.imageUrl ? '更換配圖' : '從相片集選擇'}
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>

                  <button onClick={addArticle} className="mt-4 w-full flex items-center justify-center gap-2 py-3 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 hover:border-blue-400 transition-colors font-semibold bg-white shadow-sm">
                    <i className="fas fa-plus text-[18px]"></i> 新增一篇作品
                  </button>
                </div>
              </div>
            </div>

            {/* 底部按鈕 */}
            <div className="p-6 bg-gray-50 border-t border-gray-200 mt-auto shrink-0">
              <button onClick={handlePrint} className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md">
                <i className="fas fa-print text-[20px]"></i> 列印 / 儲存為 PDF
              </button>
              <p className="text-xs text-gray-500 text-center mt-3">提示：列印時建議開啟「背景圖形」以保留復古底色。</p>
            </div>
          </div>

          {/* 右側：預覽面板 (列印時佔滿全螢幕) */}
          <div className="w-full md:w-2/3 lg:w-3/4 p-4 md:p-8 overflow-y-auto print:w-full print:p-0 print:overflow-visible">
            <div className="mx-auto drop-shadow-xl print:drop-shadow-none print:w-full">
              
              {/* ================= 復古報紙主題 (A3) ================= */}
              {theme === 'retro' && (
                <div className="bg-[#f4ebd8] text-stone-900 font-serif p-8 md:p-12 border-double border-[12px] border-stone-800 min-h-[420mm] max-w-[297mm] mx-auto">
                  <div className="text-center border-b-4 border-stone-800 pb-6 mb-10">
                    <h2 className="text-2xl tracking-[0.3em] font-bold text-stone-600 mb-4" style={getTypoStyle('pubSubtitle')}>
                      {pubSubtitle ? `【 ${pubSubtitle} 】` : ''}
                    </h2>
                    <h1 className="text-5xl md:text-7xl font-black mb-6 text-stone-900 tracking-wider" style={getTypoStyle('pubName')}>{pubName}</h1>
                    <div className="flex justify-between items-center text-sm md:text-base border-t-2 border-b-2 border-stone-800 py-2 px-4 font-bold">
                      <span style={getTypoStyle('pubDate')}>發行日期：{pubDate}</span>
                      <span>收錄篇數：{articles.length} 篇</span>
                      <span>定價：無價珍寶</span>
                    </div>
                  </div>
                  
                  {articles.map((article, index) => (
                    <div key={article.id} className="mb-12 break-inside-avoid">
                      <h2 className="text-3xl md:text-4xl font-bold mb-3 text-stone-900 text-center leading-tight" style={getArticleTitleStyle(article)}>
                        {article.title || '無標題'}
                      </h2>
                      <div className="text-center text-stone-700 italic mb-8" style={getTypoStyle('artAuthor')}>
                        文 / {article.author || '佚名'}
                      </div>
                      
                      <div className="columns-1 md:columns-2 gap-10 text-justify text-lg leading-relaxed" style={getTypoStyle('artContent')}>
                        {renderContent(article.content, 'retro', article.imageUrl)}
                      </div>
                      
                      {index < articles.length - 1 && <div className="text-center text-stone-400 text-2xl mt-12 mb-4 clear-both">❧ ❧ ❧</div>}
                    </div>
                  ))}
                </div>
              )}

              {/* ================= 現代報紙主題 (A3) ================= */}
              {theme === 'modern' && (
                <div className="bg-white text-zinc-900 font-sans p-8 md:p-12 border-x border-zinc-200 min-h-[420mm] max-w-[297mm] mx-auto">
                  <div className="border-b-[6px] border-zinc-900 pb-4 mb-10">
                    <div className="text-xs font-bold text-zinc-500 uppercase tracking-widest mb-1" style={getTypoStyle('pubSubtitle')}>{pubSubtitle}</div>
                    <h1 className="text-5xl md:text-8xl font-black tracking-tighter leading-none mb-6" style={getTypoStyle('pubName')}>{pubName}</h1>
                    <div className="flex justify-between text-sm font-medium text-zinc-600 border-t border-zinc-200 pt-3 mt-2">
                      <span className="flex items-center gap-1" style={getTypoStyle('pubDate')}><i className="fas fa-calendar-alt text-[14px]"></i> {pubDate}</span>
                      <span className="uppercase tracking-widest text-xs font-bold bg-zinc-900 text-white px-2 py-0.5">Special Edition</span>
                    </div>
                  </div>

                  {articles.map((article, index) => (
                    <div key={article.id} className="mb-16 break-inside-avoid">
                      <h2 className="text-4xl md:text-5xl font-black tracking-tight mb-4 leading-none text-zinc-800" style={getArticleTitleStyle(article)}>
                        {article.title || '無標題'}
                      </h2>
                      <div className="flex items-center gap-2 mb-8 pb-4 border-b-2 border-zinc-100 text-sm font-bold text-zinc-500 uppercase tracking-wider">
                        <i className="fas fa-user text-[14px]"></i> <span style={getTypoStyle('artAuthor')}>{article.author || '佚名'}</span>
                      </div>
                      
                      <div className="columns-1 md:columns-2 lg:columns-3 gap-8 text-justify text-base leading-relaxed" style={getTypoStyle('artContent')}>
                        {/* 引言(第一段)加粗處理 */}
                        {article.content.split('\n')[0] && (
                          <p className="mb-6 text-lg font-bold text-zinc-800 leading-relaxed break-inside-avoid">
                            {article.content.split('\n')[0]}
                          </p>
                        )}
                        {/* 剩餘內容與圖片 */}
                        {renderContent(article.content.split('\n').slice(1).join('\n'), 'modern', article.imageUrl)}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* ================= 電子報 (Newsletter) 主題 ================= */}
              {theme === 'newsletter' && (
                <div className="bg-slate-100 p-4 md:p-8 min-h-[297mm] print:bg-white print:p-0">
                  <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm overflow-hidden print:shadow-none print:rounded-none border border-slate-200 print:border-none">
                    <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-12 text-center text-white">
                      <div className="inline-block bg-white/20 px-4 py-1.5 rounded-full text-xs font-semibold tracking-wider mb-5 backdrop-blur-sm" style={getTypoStyle('pubSubtitle')}>
                        {pubSubtitle}
                      </div>
                      <h1 className="text-4xl md:text-5xl font-bold leading-tight mb-4" style={getTypoStyle('pubName')}>{pubName}</h1>
                      <div className="text-blue-100 text-base font-medium opacity-90" style={getTypoStyle('pubDate')}>{pubDate}</div>
                    </div>

                    <div className="p-6 md:p-10 bg-slate-50 space-y-8 print:bg-white print:p-4">
                      {articles.map((article, index) => (
                        <div key={article.id} className="bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-slate-100 print:border-b print:shadow-none print:rounded-none print:mb-8">
                          <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-3 leading-snug" style={getArticleTitleStyle(article)}>
                            {article.title || '無標題'}
                          </h2>
                          <div className="flex items-center gap-2 text-indigo-600 text-sm font-semibold mb-8 pb-5 border-b border-slate-100">
                            <i className="fas fa-user text-[16px]"></i> <span style={getTypoStyle('artAuthor')}>{article.author || '佚名'}</span>
                          </div>
                          <div className="text-slate-600 text-lg leading-loose" style={getTypoStyle('artContent')}>
                            {renderContent(article.content, 'newsletter', article.imageUrl)}
                          </div>
                        </div>
                      ))}
                    </div>
                    
                    <div className="py-10 bg-white border-t border-slate-100 text-center text-slate-400 text-sm">
                      <p className="font-medium text-slate-500">感謝您的閱讀</p>
                      <p className="mt-2 text-xs">由學生作品排版產生器發送</p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ================= 相片集彈出視窗 (Modal) ================= */}
          {isGalleryOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 md:p-8 animate-in fade-in duration-200 print:hidden">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[85vh] flex overflow-hidden flex-col md:flex-row relative">
                {/* 關閉按鈕 */}
                <button onClick={() => { setIsGalleryOpen(false); setSelectingForArticle(null); }} className="absolute top-4 right-4 z-20 p-2 bg-white/80 backdrop-blur rounded-full shadow hover:bg-gray-100 text-gray-600 transition-colors">
                  <i className="fas fa-times text-[20px]"></i>
                </button>

                {/* 左側 Sidebar: 子相簿列表 */}
                <div className="w-full md:w-64 bg-gray-50 border-r border-gray-200 p-5 flex flex-col h-full shrink-0">
                  <h2 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><i className="fas fa-folder text-[20px] text-indigo-600"></i> 相簿分類</h2>
                  <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                    {albums.map(album => (
                      <div key={album.id} onClick={() => setActiveAlbumId(album.id)} className={`flex items-center justify-between p-3 rounded-lg cursor-pointer group transition-colors ${activeAlbumId === album.id ? 'bg-indigo-100 text-indigo-800 shadow-sm border border-indigo-200' : 'hover:bg-gray-200 text-gray-700 border border-transparent'}`}>
                        {editingAlbumId === album.id ? (
                          <input autoFocus value={editAlbumName} onChange={e => setEditAlbumName(e.target.value)} onBlur={() => handleSaveAlbumName(album.id)} onKeyDown={e => e.key === 'Enter' && handleSaveAlbumName(album.id)} className="w-full text-sm p-1 rounded border-indigo-400 outline-none ring-2 ring-indigo-200" onClick={e => e.stopPropagation()} />
                        ) : (
                          <span className="truncate text-sm font-semibold flex-1" onDoubleClick={() => { setEditingAlbumId(album.id); setEditAlbumName(album.name); }}>{album.name}</span>
                        )}
                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                          <button onClick={(e) => { e.stopPropagation(); setEditingAlbumId(album.id); setEditAlbumName(album.name); }} className="p-1.5 hover:text-indigo-600 hover:bg-indigo-50 rounded" title="重新命名"><i className="fas fa-pen text-[14px]"></i></button>
                          {albums.length > 1 && <button onClick={(e) => { e.stopPropagation(); handleDeleteAlbum(album.id); }} className="p-1.5 hover:text-red-600 hover:bg-red-50 rounded" title="刪除相簿"><i className="fas fa-trash-alt text-[14px]"></i></button>}
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={handleCreateAlbum} className="mt-4 w-full py-3 border-2 border-dashed border-gray-300 text-gray-600 rounded-lg hover:bg-gray-100 hover:border-gray-400 text-sm font-bold flex items-center justify-center gap-2 transition-colors">
                    <i className="fas fa-folder-plus text-[18px]"></i> 新增子相簿
                  </button>
                </div>

                {/* 右側: 相片網格 */}
                <div className="flex-1 flex flex-col h-full bg-white relative">
                  {/* Header */}
                  <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-white z-10">
                    <div>
                      <h3 className="font-bold text-xl text-gray-800 flex items-center gap-2">
                        {albums.find(a => a.id === activeAlbumId)?.name}
                      </h3>
                      <p className="text-sm text-gray-500 mt-1">共 {albums.find(a => a.id === activeAlbumId)?.images.length} 張相片</p>
                    </div>
                    <div className="flex items-center gap-4">
                      {selectingForArticle && (
                        <span className="bg-amber-100 text-amber-800 text-sm px-4 py-2 rounded-full font-bold animate-pulse flex items-center gap-2 border border-amber-200 shadow-sm">
                          <i className="fas fa-check text-[16px]"></i> 請點選一張相片作為作品配圖
                        </span>
                      )}
                      <label className="cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg shadow-sm flex items-center gap-2 text-sm font-bold transition-colors">
                        <i className="fas fa-upload text-[18px]"></i> 上傳相片
                        <input type="file" multiple accept="image/*" className="hidden" onChange={handleUploadImages} ref={fileInputRef} />
                      </label>
                    </div>
                  </div>

                  {/* Grid 區塊 */}
                  <div className="flex-1 overflow-y-auto p-6 bg-slate-50/50">
                    {albums.find(a => a.id === activeAlbumId)?.images.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-gray-400">
                        <i className="fas fa-images text-[64px] mb-4 opacity-30 text-indigo-400"></i>
                        <p className="text-lg font-semibold text-gray-600">此相簿目前沒有相片</p>
                        <p className="text-sm mt-2">點擊右上角「上傳相片」從您的電腦中選取</p>
                      </div>
                    ) : (
                      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 auto-rows-max">
                        {albums.find(a => a.id === activeAlbumId)?.images.map(img => (
                          <div key={img.id} className="relative group aspect-[4/3] rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-white">
                            <img 
                              src={img.url} 
                              className="w-full h-full object-cover cursor-pointer hover:scale-105 transition-transform duration-300" 
                              onClick={() => handleSelectImage(img.url)} 
                              alt="相簿照片" 
                            />
                            {/* 一般管理模式：顯示刪除按鈕 */}
                            {!selectingForArticle && (
                              <button onClick={() => handleDeleteImage(activeAlbumId, img.id)} className="absolute top-2 right-2 p-2 bg-red-500/90 hover:bg-red-600 text-white rounded-lg opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                                <i className="fas fa-trash-alt text-[16px]"></i>
                              </button>
                            )}
                            {/* 挑選照片模式：顯示遮罩與套用提示 */}
                            {selectingForArticle && (
                              <div 
                                onClick={() => handleSelectImage(img.url)} 
                                className="absolute inset-0 bg-indigo-600/20 opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer flex items-center justify-center"
                              >
                                <div className="bg-indigo-600 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg flex items-center gap-2 transform translate-y-2 group-hover:translate-y-0 transition-all">
                                  <i className="fas fa-check text-[18px]"></i> 設為配圖
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 將 React 應用程式掛載到 DOM 上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
