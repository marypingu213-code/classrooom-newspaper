<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A3 學生報紙排版系統</title>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body{
    margin:0;
    background:#e5e7eb;
    font-family:system-ui;
  }

  @media print{
    body{
      background:white;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .no-print{
      display:none !important;
    }

    @page{
      size:A3 landscape;
      margin:0;
    }
  }

  .paper{
    width:420mm;
    min-height:297mm;
    background:#f5ecd7;
    margin:auto;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);

    /* ★ 固定上下2cm */
    padding-top:2cm;
    padding-bottom:2cm;
    padding-left:1.5cm;
    padding-right:1.5cm;
  }

  .news-grid{
    display:grid;

    /* ★ 改成6欄 */
    grid-template-columns:repeat(6,1fr);

    /* ★ 真正像報紙的間距 */
    gap:1rem;

    align-items:start;
  }

  .article{
    background:rgba(255,255,255,0.45);
    border:2px solid #4b5563;
    padding:14px;
    break-inside:avoid;
    page-break-inside:avoid;
    position:relative;
  }

  .article img{
    width:100%;
    height:auto;
    object-fit:cover;
    border:2px solid #444;
    margin-bottom:10px;
  }

  .dragging{
    opacity:0.4;
  }

  .toolbar{
    width:360px;
    background:white;
    height:100vh;
    overflow:auto;
    border-right:1px solid #ddd;
  }

  .resize-btn{
    width:32px;
    height:32px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-weight:bold;
  }

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState} = React;

const defaultArticles = [
{
  id:1,
  title:'媽媽謝謝您',
  author:'小安',
  content:'媽媽每天幫我準備早餐。\n我最喜歡媽媽的笑容。',
  image:'https://picsum.photos/600/400?1',

  /* 小圖=1格 */
  imageSize:'small',
  colSpan:1
},

{
  id:2,
  title:'戶外教育真有趣',
  author:'小熙',
  content:'我們去了科學博物館。\n我看到恐龍骨骼。',
  image:'https://picsum.photos/600/400?2',

  /* 中圖=2格 */
  imageSize:'medium',
  colSpan:2
},

{
  id:3,
  title:'我的媽媽',
  author:'小晴',
  content:'媽媽很溫柔。\n我愛媽媽。',
  image:'https://picsum.photos/600/400?3',

  /* 大圖=3格 */
  imageSize:'large',
  colSpan:3
}
];

function App(){

  const [articles,setArticles] = useState(defaultArticles);

  /* =========================
     改變圖片大小 → 自動改欄位
  ========================= */

  const changeImageSize = (id,size)=>{

    const map = {
      small:{span:1},
      medium:{span:2},
      large:{span:3}
    };

    setArticles(prev =>
      prev.map(a => {

        if(a.id !== id) return a;

        return {
          ...a,
          imageSize:size,
          colSpan:map[size].span
        };

      })
    );
  };

  /* =========================
     更新文章
  ========================= */

  const updateArticle = (id,key,value)=>{

    setArticles(prev =>
      prev.map(a =>
        a.id===id
          ? {...a,[key]:value}
          : a
      )
    );
  };

  /* =========================
     新增文章
  ========================= */

  const addArticle = ()=>{

    setArticles(prev => [
      ...prev,
      {
        id:Date.now(),
        title:'新文章',
        author:'作者',
        content:'請輸入內容',
        image:'https://picsum.photos/600/400?' + Math.random(),

        /* 預設中型 */
        imageSize:'medium',
        colSpan:2
      }
    ]);
  };

  /* =========================
     刪除
  ========================= */

  const deleteArticle = (id)=>{
    setArticles(prev => prev.filter(a=>a.id!==id));
  };

  return (

  <div className="flex">

    {/* 左側控制 */}
    <div className="toolbar no-print p-5">

      <div className="flex justify-between items-center mb-5">
        <h1 className="font-bold text-xl">
          報紙排版
        </h1>

        <button
          onClick={addArticle}
          className="bg-indigo-600 text-white px-4 py-2 rounded-xl"
        >
          新增
        </button>
      </div>

      <div className="space-y-5">

        {articles.map(article => (

          <div
            key={article.id}
            className="border rounded-2xl p-4 bg-gray-50"
          >

            <input
              value={article.title}
              onChange={e=>updateArticle(article.id,'title',e.target.value)}
              className="w-full border p-2 rounded-lg mb-2"
            />

            <input
              value={article.author}
              onChange={e=>updateArticle(article.id,'author',e.target.value)}
              className="w-full border p-2 rounded-lg mb-2"
            />

            <textarea
              rows="4"
              value={article.content}
              onChange={e=>updateArticle(article.id,'content',e.target.value)}
              className="w-full border p-2 rounded-lg mb-3"
            />

            {/* 圖片大小 */}
            <div className="flex gap-2 mb-3">

              <button
                className={`resize-btn ${
                  article.imageSize==='small'
                  ? 'bg-indigo-600 text-white'
                  : 'bg-gray-200'
                }`}
                onClick={()=>changeImageSize(article.id,'small')}
              >
                小
              </button>

              <button
                className={`resize-btn ${
                  article.imageSize==='medium'
                  ? 'bg-indigo-600 text-white'
                  : 'bg-gray-200'
                }`}
                onClick={()=>changeImageSize(article.id,'medium')}
              >
                中
              </button>

              <button
                className={`resize-btn ${
                  article.imageSize==='large'
                  ? 'bg-indigo-600 text-white'
                  : 'bg-gray-200'
                }`}
                onClick={()=>changeImageSize(article.id,'large')}
              >
                大
              </button>

            </div>

            {/* 手動欄寬 */}
            <div className="mb-3">

              <div className="text-xs mb-1 text-gray-500">
                手動調整欄數
              </div>

              <div className="flex gap-1">

                {[1,2,3,4,5,6].map(n => (

                  <button
                    key={n}
                    onClick={()=>updateArticle(article.id,'colSpan',n)}
                    className={`w-8 h-8 rounded-lg text-sm font-bold ${
                      article.colSpan===n
                      ? 'bg-rose-500 text-white'
                      : 'bg-gray-200'
                    }`}
                  >
                    {n}
                  </button>

                ))}

              </div>

            </div>

            <button
              onClick={()=>deleteArticle(article.id)}
              className="bg-red-500 text-white px-3 py-2 rounded-lg w-full"
            >
              刪除文章
            </button>

          </div>

        ))}

      </div>

      <button
        onClick={()=>window.print()}
        className="w-full mt-5 bg-green-600 text-white py-3 rounded-2xl font-bold"
      >
        列印 / PDF
      </button>

    </div>

    {/* 右側報紙 */}
    <div className="flex-1 overflow-auto p-8">

      <div className="paper">

        {/* 標題 */}
        <div className="border-b-[6px] border-double border-black pb-5 mb-8">

          <div className="text-center">

            <div className="tracking-[0.5em] text-gray-600 mb-3">
              CLASS TIMES
            </div>

            <h1 className="text-7xl font-black tracking-widest mb-5">
              六年甲班小報
            </h1>

            <div className="border-y-2 border-black py-2 flex justify-between text-sm font-bold">
              <span>🌸 母親節 × 戶外教育特刊 🌿</span>
              <span>2026年5月</span>
            </div>

          </div>

        </div>

        {/* 報紙內容 */}
        <div className="news-grid">

          {articles.map(article => (

            <div
              key={article.id}
              className="article"
              style={{
                gridColumn:`span ${article.colSpan}`
              }}
            >

              <h2 className="text-3xl font-black mb-2 leading-tight">
                {article.title}
              </h2>

              <div className="text-sm font-bold text-gray-500 mb-4">
                撰文 / {article.author}
              </div>

              <img src={article.image} />

              <div className="leading-relaxed whitespace-pre-line text-[15px]">
                {article.content}
              </div>

            </div>

          ))}

        </div>

      </div>

    </div>

  </div>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
